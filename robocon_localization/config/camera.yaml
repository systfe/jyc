rtsp_camera_publisher:
  ros__parameters:
    # 如果要强制使用某一个完整地址，就填写 rtsp_url。
    # 留空时会先尝试 http_paths，再尝试 rtsp_paths。
    rtsp_url: ""

    # 实车直接修改这里的 IP 即可。
    # 如果要完全指定图像流地址，可以填写上面的 rtsp_url。
    camera_ip: "192.168.10.100"
    rtsp_port: 554
    username: "admin"
    password: "zxcvbnm12"
    
    image_topic: "/robot/image_raw"

  # 发布前缩放图像，用于降低 ROS 传输压力和定位延迟。
    output_width: 640
    output_height: 640





    # 当前已验证的低延迟方案使用 OpenCV/FFmpeg。
    # 如果需要单独测试 GStreamer，可以把它改成 "gstreamer" 或 "auto"。
    backend: "opencv"
    gst_latency_ms: 0
    gst_protocols: "udp"

    # HTTP/MJPEG 候选地址会先于 RTSP 尝试。
    # 对这类相机来说，如果 HTTP/MJPEG 能打开，通常比 H264 RTSP 延迟更低。
    http_open_profiles:
      - "http_plain"

    http_paths:
      - "/video"
      - "/mjpeg"
      - "/mjpg/video.mjpg"
      - "/videostream.cgi"
      - "/cgi-bin/mjpg/video.cgi?channel=1&subtype=1"
      - "/ISAPI/Streaming/channels/102/httpPreview"

    # 优先尝试低延迟配置；某个配置打不开时，会继续尝试下一个。
    rtsp_open_profiles:
      - "udp_low_delay"
      - "tcp_low_delay"
      - "tcp_compatible"
      - "plain"

    # 已测试的 RTSP 地址顺序。
    # 如果相机后台提供了更低延迟的流，可以把对应地址放到更前面。
    rtsp_paths:
      - "/stream1"
      - "/stream2"
      - "/Streaming/Channels/102"
      - "/cam/realmonitor?channel=1&subtype=1"
      - "/live"
      - "/h264"
      - "/h265"
      - "/ch1/main/av_stream"
      - "/Streaming/Channels/101"
      - "/cam/realmonitor?channel=1&subtype=0"

    rtsp_transport: "tcp"
    open_timeout_ms: 2000
    read_timeout_ms: 500
    use_open_params: false
    use_hw_acceleration: false


    frame_id: "fisheye_camera"
    fps_limit: 30.0
    publish_queue_size: 1

    # 请求相机输出的采集宽高；0 表示保持相机默认值。
    capture_width: 0
    capture_height: 0

    

    reconnect_delay_s: 0.5
    log_interval_s: 2.0
